<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png?v=4" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
  
  <!-- SEO -->
  <title>MealfitRD | Nutrición Personalizada con IA</title>
  <meta name="description" content="Planes de alimentación 100% personalizados con IA avanzada. Adaptados a tus gustos, presupuesto y estilo de vida. Comienza gratis." />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />

  <!-- PWA & Apple iOS Support -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MealfitRD" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <!-- DNS prefetch for external resources -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

  <!-- Preconnect to critical origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Non-render-blocking font loading -->
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'" />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet" />
  </noscript>
  <style>
    #pwa-splash { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; background: #F8FAFC; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; position: fixed; top: 0; left: 0; z-index: 9999; }
    .splash-icon { width: 72px; height: 72px; background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); border-radius: 20px; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3); display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite ease-in-out; margin-bottom: 24px; }
    .splash-icon svg { width: 40px; height: 40px; color: white; }
    @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }
    .splash-text { font-size: 24px; font-weight: 700; color: #0F172A; letter-spacing: -0.02em; }
    .splash-subtext { font-size: 14px; color: #64748B; margin-top: 8px; }
    .splash-loader { margin-top: 32px; width: 32px; height: 32px; border: 3px solid #E2E8F0; border-top-color: #4F46E5; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: dark) {
      #pwa-splash { background: #0F172A; }
      .splash-text { color: #F8FAFC; }
      .splash-subtext { color: #94A3B8; }
      .splash-loader { border: 3px solid #334155; border-top-color: #818CF8; }
    }
  </style>
</head>

<body>
  <div id="root">
  </div>
  
  <!-- PWA Native Splash Screen placed OUTSIDE root so React doesn't destroy it -->
  <div id="pwa-splash" style="transition: opacity 0.5s ease; opacity: 1;">
    <div class="splash-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
    </div>
    <div class="splash-text">MealfitRD</div>
    <div class="splash-subtext">Nutrición con IA</div>
    <div class="splash-loader"></div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
