<!doctype html>
<html lang="es-DO">

<head>
  <meta charset="UTF-8" />
  <!-- [P6-SPEED-IMG · 2026-06-01] favicon recomprimido 302KB→54.8KB (palette 128c,
       visualmente idéntico a 16-48px). ?v bump fuerza refetch del nuevo archivo.
       [P2-FAVICON-DEDUPE · 2026-07-09] favicon-transparent.png era BYTE-IDÉNTICO
       a favicon.png (MD5 71c4a858) — 54.8KB duplicados en el precache del SW.
       Todas las refs apuntan ahora a /favicon.png; el duplicado se eliminó. -->
  <link rel="icon" type="image/png" href="/favicon.png?v=21" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=21" />
  <!-- [P1-VIEWPORT-ZOOM-LOCK · 2026-07-09] Zoom BLOQUEADO (feel de app nativa).
       SUPERSEDE a P2-A11Y-VIEWPORT-ZOOM (2026-05-31, que habilitó pinch-zoom por
       WCAG 1.4.4 Resize Text). Reversión confirmada con el dueño: el zoom
       accidental (pinch de 2 dedos al scrollear carruseles horizontales, doble-tap,
       auto-zoom de iOS al enfocar campos) se disparaba SIN QUERER y dejaba la UI
       ampliada/cortada — pésimo UX en un PWA standalone. maximum-scale=1 +
       user-scalable=no bloquea el pinch en Android Chrome (respeta el flag) y en el
       PWA standalone de iOS; se complementa con `touch-action: manipulation` (mata
       doble-tap) y un preventer de gestos iOS en main.jsx (Safari ignora
       user-scalable=no en browser). Trade-off WCAG aceptado: el texto sigue legible
       y la escala de fuente a nivel del SO (Dynamic Type / Android font size) sigue
       funcionando como vía de accesibilidad real. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- [APPEARANCE-THEME · 2026-05-28] No-flash theme boot. Corre síncrono en
       <head> ANTES del primer paint (y antes del splash) para que el atributo
       html[data-theme] esté fijado cuando el navegador pinte. Lee la
       preferencia persistida en localStorage('mealfit_theme') — system|light|
       dark — y la resuelve a un valor concreto (system → prefers-color-scheme).
       El motor JS (src/utils/theme.js) re-aplica esto en runtime y escucha
       cambios del sistema; este script solo evita el flash de tema claro→oscuro
       en el arranque en frío. [P3-DEFAULT-DARK] Default = 'dark'; un 'system' previo
       migra a 'dark' one-time. Defensivo: cualquier excepción cae a 'dark'. -->
  <script>
    (function () {
      try {
        // [P3-DEFAULT-DARK · 2026-06-01] Migración one-time: un 'system' previo
        // pasa a 'dark' una sola vez (decisión: oscuro por defecto). Tras esto,
        // re-elegir "Sistema" persiste normal. Sin preferencia → 'dark' por default.
        if (!localStorage.getItem('mealfit_theme_dark_default_v1')) {
          if (localStorage.getItem('mealfit_theme') === 'system') {
            localStorage.setItem('mealfit_theme', 'dark');
          }
          localStorage.setItem('mealfit_theme_dark_default_v1', '1');
        }
        var pref = localStorage.getItem('mealfit_theme') || 'dark';
        var dark = pref === 'dark' ? true
          : pref === 'light' ? false
          : !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        // [P3-LANDING-DARK-ONLY · 2026-06-29] El landing/marketing es SIEMPRE oscuro
        // (no tiene config de apariencia). Forzar síncrono en carga directa/refresh
        // evita el flash claro→oscuro. Sync con src/utils/marketingRoutes.js.
        var MK = ['/', '/precios', '/como-funciona', '/funciones', '/precision', '/motor'];
        if (MK.indexOf(location.pathname) !== -1) dark = true;
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <!-- SEO -->
  <title>MealfitRD | Nutrición Personalizada con IA</title>
  <meta name="description" content="Planes de alimentación 100% personalizados con IA avanzada. Adaptados a tus gustos, presupuesto y estilo de vida. Comienza gratis." />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="application-name" content="MealfitRD" />
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />
  <link rel="canonical" href="https://mealfitrd.com/" />

  <!-- [P1-SEO-SOCIAL · 2026-05-31] Open Graph + Twitter Cards. El frontend es
       un SPA client-render sin SSR/prerender: un unfurler (WhatsApp #1 en RD,
       Slack, Telegram, Facebook, X) que hace GET a cualquier ruta recibe este
       index.html estático. Sin OG la preview cae a URL cruda sin imagen, lo que
       reduce el CTR de un producto cuyo crecimiento depende de compartir el
       enlace. La imagen física vive en /public/og-image.png (1200×1200, cuadrada;
       coincide con og:image:width/height). La CSP de nginx ya la permite. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MealfitRD" />
  <meta property="og:title" content="MealfitRD | Nutrición Personalizada con IA" />
  <meta property="og:description" content="Planes de alimentación 100% personalizados con IA avanzada. Adaptados a tus gustos, presupuesto y estilo de vida. Comienza gratis." />
  <meta property="og:url" content="https://mealfitrd.com/" />
  <meta property="og:image" content="https://mealfitrd.com/og-image.png?v=3" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="1200" />
  <meta property="og:image:alt" content="MealfitRD — Nutrición personalizada con IA para República Dominicana" />
  <meta property="og:locale" content="es_DO" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MealfitRD | Nutrición Personalizada con IA" />
  <meta name="twitter:description" content="Planes de alimentación 100% personalizados con IA avanzada. Adaptados a tus gustos, presupuesto y estilo de vida. Comienza gratis." />
  <meta name="twitter:image" content="https://mealfitrd.com/og-image.png?v=3" />

  <!-- [P3-SEO-JSONLD · 2026-05-31] Structured data Organization (bajo riesgo,
       alto retorno: elegibilidad para knowledge panel). NO se declara
       Product/Offer porque los precios viven en el cliente (Pricing.jsx) y son
       dinámicos — un precio estático aquí arriesgaría inconsistencia. -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MealfitRD",
      "url": "https://mealfitrd.com/",
      "logo": "https://mealfitrd.com/favicon.png",
      "description": "Planes de alimentación personalizados con IA, adaptados a tus gustos, presupuesto y estilo de vida.",
      "areaServed": {
        "@type": "Country",
        "name": "República Dominicana"
      },
      "sameAs": [
        "https://www.instagram.com/mealfit_rd",
        "https://www.facebook.com/share/1HkwoX8zHF/",
        "https://www.tiktok.com/@mealfitrd",
        "https://www.youtube.com/@MealfitRD"
      ]
    }
  </script>

  <!-- [P3-SEO-WEBSITE-JSONLD · 2026-06-28] Structured data WebSite — señal
       primaria que Google usa para el NOMBRE DEL SITIO en negrita en los
       resultados (junto a og:site_name + <title>). Sin potentialAction/
       SearchAction: no hay endpoint de búsqueda público indexable. -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "MealfitRD",
      "alternateName": "Mealfit RD",
      "url": "https://mealfitrd.com/",
      "inLanguage": "es-DO"
    }
  </script>

  <!-- [P2-PRECONNECT-AUTH · 2026-07-09] El origen de Neon Auth está en el
       critical path del boot autenticado (el splash espera la resolución de la
       sesión): preconnect abre DNS+TCP+TLS en paralelo con la descarga del JS
       en vez de en serie al primer fetch. Host fijo de .env.production; si el
       endpoint de Neon cambia, actualizar aquí también. -->
  <link rel="preconnect" href="https://ep-divine-sun-aiaszh9z.neonauth.c-4.us-east-1.aws.neon.tech" crossorigin />
  <link rel="dns-prefetch" href="https://ep-divine-sun-aiaszh9z.neonauth.c-4.us-east-1.aws.neon.tech" />

  <!-- PWA & Apple iOS Support -->
  <!-- [P2-MANIFEST-DEDUPE · 2026-07-09] /manifest.json es el SSOT único
       (VitePWA manifest:false — antes inyectaba un manifest.webmanifest
       divergente: lang 'en', sin shortcuts ni orientation). -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MealfitRD" />
  <!-- [P3-PWA-ICON-PADDING · 2026-06-16] Icono del home screen con padding (logo
       ~66%, fondo blanco) — antes iba a sangre. El favicon web no se toca. ?v=2
       bustea el cache del apple-touch-icon. -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=10" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png?v=10" />
  <!-- [P3-SELF-HOST-FONTS · 2026-05-12] Outfit + Plus Jakarta Sans ahora
       self-hosted en /fonts/*.woff2 (declaraciones @font-face viven en
       frontend/src/index.css). Pre-fix cargaba CSS + woff2 desde
       fonts.googleapis.com / fonts.gstatic.com — privacy leak (IP del
       visitante a Google en cada carga), LCP variable según latencia del
       CDN externo, dependencia externa para tipografía. Removidos:
       dns-prefetch + preconnect + <link rel="stylesheet"> + <noscript>
       fallback a Google. Anchor: P3-SELF-HOST-FONTS. -->
  <link rel="preload" href="/fonts/QGYvz_MVcBeNP4NJtEtq.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/LDIoaomQNQcsA88c7O9yZ4KMCoOg4Ko20yw.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    #pwa-splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(ellipse 80% 60% at 50% 35%, rgba(79, 70, 229, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 50% 70%, rgba(244, 63, 94, 0.05) 0%, transparent 55%),
        #F8FAFC;
      animation: splashFadeIn 0.4s ease-out;
    }
    @keyframes splashFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .splash-brand {
      font-size: 44px;
      font-weight: 800;
      color: #0F172A;
      letter-spacing: -0.04em;
      line-height: 1;
      animation: splashRise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.05s;
    }
    .splash-brand .splash-r { color: #4F46E5; }
    .splash-brand .splash-d { color: #F43F5E; }
    .splash-tagline {
      font-size: 15px;
      font-weight: 500;
      color: #64748B;
      margin-top: 14px;
      letter-spacing: 0.01em;
      animation: splashRise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.18s;
    }
    @keyframes splashRise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .splash-dots {
      display: flex;
      gap: 8px;
      margin-top: 40px;
      animation: splashRise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.3s;
    }
    .splash-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4F46E5;
      opacity: 0.35;
      animation: splashDot 1.2s ease-in-out infinite;
    }
    .splash-dots span:nth-child(2) {
      background: #7C3AED;
      animation-delay: 0.15s;
    }
    .splash-dots span:nth-child(3) {
      background: #F43F5E;
      animation-delay: 0.3s;
    }
    @keyframes splashDot {
      0%, 80%, 100% { opacity: 0.35; transform: scale(0.85); }
      40% { opacity: 1; transform: scale(1.15); }
    }
    /* [APPEARANCE-THEME · 2026-05-28] Splash oscuro driven por html[data-theme]
       (lo fija el boot script de arriba) en vez de @media prefers-color-scheme.
       Así respeta la elección EXPLÍCITA del usuario: si eligió "Básico" (light)
       pero su SO está en oscuro, el splash se queda claro — y viceversa. El
       valor "system" ya quedó resuelto a dark/light por el boot script. */
    html[data-theme="dark"] #pwa-splash {
      background:
        radial-gradient(ellipse 80% 60% at 50% 35%, rgba(129, 140, 248, 0.14) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 50% 70%, rgba(244, 63, 94, 0.08) 0%, transparent 55%),
        #0B1120;
    }
    html[data-theme="dark"] .splash-brand { color: #F8FAFC; }
    html[data-theme="dark"] .splash-brand .splash-r { color: #818CF8; }
    html[data-theme="dark"] .splash-brand .splash-d { color: #FB7185; }
    html[data-theme="dark"] .splash-tagline { color: #94A3B8; }
    html[data-theme="dark"] .splash-dots span { background: #818CF8; }
    html[data-theme="dark"] .splash-dots span:nth-child(2) { background: #A78BFA; }
    html[data-theme="dark"] .splash-dots span:nth-child(3) { background: #FB7185; }
    @media (prefers-reduced-motion: reduce) {
      #pwa-splash, .splash-brand, .splash-tagline, .splash-dots { animation: none !important; }
      .splash-dots span { animation: splashDotReduced 1.6s ease-in-out infinite; }
      @keyframes splashDotReduced {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
    }
  </style>
</head>

<body>
  <div id="root">
  </div>
  
  <!-- PWA Native Splash Screen placed OUTSIDE root so React doesn't destroy it -->
  <div id="pwa-splash" style="transition: opacity 0.5s ease; opacity: 1;">
    <div class="splash-brand">
      Mealfit<span class="splash-r">R</span><span class="splash-d">D</span>
    </div>
    <div class="splash-tagline">Nutrición personalizada con IA</div>
    <!-- [P3-NEW-SPLASH-A11Y · 2026-05-15] aria-live="polite" + aria-busy="true" + role="status" para que screen readers anuncien el loading state. Pre-fix solo aria-label. -->
    <div class="splash-dots" aria-label="Cargando" aria-live="polite" aria-busy="true" role="status">
      <span></span><span></span><span></span>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
